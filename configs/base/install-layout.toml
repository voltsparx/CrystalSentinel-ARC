[product]
name = "CrystalSentinel-ARC"
service_name = "crystalsentinel-arc"

[linux]
prefix = "/usr/local"
bin_dir = "bin"
lib_dir = "lib"
config_dir = "etc/crystalsentinel-arc"
rules_dir = "etc/crystalsentinel-arc/rules"
logs_dir = "var/log/crystalsentinel-arc"
state_dir = "var/lib/crystalsentinel-arc"
run_dir = "var/run/crystalsentinel-arc"

[macos]
prefix = "/usr/local"
bin_dir = "bin"
lib_dir = "lib"
config_dir = "etc/crystalsentinel-arc"
rules_dir = "etc/crystalsentinel-arc/rules"
logs_dir = "var/log/crystalsentinel-arc"
state_dir = "var/lib/crystalsentinel-arc"
run_dir = "var/run/crystalsentinel-arc"

[windows]
program_files_dir = "C:\\Program Files\\CrystalSentinel-ARC"
program_data_dir = "C:\\ProgramData\\CrystalSentinel-ARC"
bin_dir = "bin"
lib_dir = "lib"
config_dir = "etc"
rules_dir = "etc\\rules"
logs_dir = "logs"
state_dir = "state"
run_dir = "run"
